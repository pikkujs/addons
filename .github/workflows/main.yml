name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install
      - run: yarn tsc

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      - run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: node .github/changeset-version.cjs
          publish: yarn release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'

      - name: Notify registry of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' | \
            node -e "
              const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              for (const pkg of pkgs) {
                console.log(pkg.name);
              }
            " | while read -r name; do
              bash scripts/notify-registry.sh "$name"
            done
        env:
          REGISTRY_API_KEY: ${{ secrets.REGISTRY_API_KEY }}
