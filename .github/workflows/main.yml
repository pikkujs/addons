name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  discover:
    name: Discover changed addons
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_addons: ${{ steps.find.outputs.has_addons }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - id: find
        run: |
          # Get packages with pending changesets
          npx changeset status --output cs-status.json 2>/dev/null || true

          # Map package names to directories
          addons=$(node -e "
            const fs = require('fs');
            if (!fs.existsSync('cs-status.json')) process.exit(0);
            const status = JSON.parse(fs.readFileSync('cs-status.json', 'utf8'));
            const names = new Set(status.releases.map(r => r.name));
            const { execSync } = require('child_process');
            const dirs = execSync('find packages -maxdepth 3 -name package.json -not -path \"*/test/*\" -not -path \"*/node_modules/*\"', { encoding: 'utf8' })
              .trim().split('\n');
            for (const dir of dirs) {
              const pkg = JSON.parse(fs.readFileSync(dir, 'utf8'));
              if (names.has(pkg.name)) {
                console.log(dir.replace('/package.json', ''));
              }
            }
          ")

          matrix=$(echo "$addons" | grep -v '^$' | sort | jq -R -s -c 'split("\n") | map(select(length > 0)) | {addon: .}')
          has_addons=$(echo "$addons" | grep -v '^$' | wc -l | tr -d ' ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_addons=$([[ $has_addons -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Changed addons: $has_addons"

  build:
    name: Build (${{ matrix.addon }})
    needs: discover
    if: needs.discover.outputs.has_addons == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - run: cd ${{ matrix.addon }} && npx pikku all
      - run: cd ${{ matrix.addon }} && npx tsc --noEmit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [discover, build]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: node .github/changeset-version.cjs
          publish: yarn release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'

      - name: Notify registry of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' | \
            node -e "
              const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              for (const pkg of pkgs) {
                console.log(pkg.name);
              }
            " | while read -r name; do
              bash scripts/notify-registry.sh "$name"
            done
        env:
          REGISTRY_API_KEY: ${{ secrets.REGISTRY_API_KEY }}
