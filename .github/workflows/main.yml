name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  discover:
    name: Discover addons
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          matrix=$(find packages -maxdepth 3 -name pikku.config.json -not -path '*/test/*' -not -path '*/node_modules/*' \
            | xargs -I{} dirname {} \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0)) | {addon: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.addon }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - run: cd ${{ matrix.addon }} && npx pikku all
      - run: cd ${{ matrix.addon }} && npx tsc --noEmit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - run: yarn workspaces foreach --all run pikku
      - run: yarn workspaces foreach --all run build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: node .github/changeset-version.cjs
          publish: yarn release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'

      - name: Notify registry of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' | \
            node -e "
              const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              for (const pkg of pkgs) {
                console.log(pkg.name);
              }
            " | while read -r name; do
              bash scripts/notify-registry.sh "$name"
            done
        env:
          REGISTRY_API_KEY: ${{ secrets.REGISTRY_API_KEY }}
