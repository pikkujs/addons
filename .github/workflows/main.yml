name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  discover:
    name: Discover changed addons
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_addons: ${{ steps.find.outputs.has_addons }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: find
        run: |
          # Get all addon directories
          all_addons=$(find packages -maxdepth 3 -name pikku.config.json -not -path '*/test/*' -not -path '*/node_modules/*' \
            | xargs -I{} dirname {} \
            | sort)

          # Get changed files since previous commit
          changed=$(git diff --name-only HEAD~1 2>/dev/null || echo "ALL")

          # If root-level files changed (lockfile, root config), rebuild all
          if echo "$changed" | grep -qE '^(yarn\.lock|package\.json|tsconfig\.json|\.github/)' || [ "$changed" = "ALL" ]; then
            addons="$all_addons"
          else
            # Filter to only addons with changes
            addons=""
            for addon in $all_addons; do
              if echo "$changed" | grep -q "^${addon}/"; then
                addons="$addons
          $addon"
              fi
            done
          fi

          matrix=$(echo "$addons" | grep -v '^$' | head -5 | jq -R -s -c 'split("\n") | map(select(length > 0)) | {addon: .}')
          has_addons=$(echo "$addons" | grep -v '^$' | wc -l | tr -d ' ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_addons=$([[ $has_addons -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Changed addons: $has_addons"

  build:
    name: Build (${{ matrix.addon }})
    needs: discover
    if: needs.discover.outputs.has_addons == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - run: cd ${{ matrix.addon }} && npx pikku all
      - run: cd ${{ matrix.addon }} && npx tsc --noEmit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [discover, build]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        shell: bash
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: node .github/changeset-version.cjs
          publish: yarn release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'

      - name: Notify registry of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' | \
            node -e "
              const pkgs = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              for (const pkg of pkgs) {
                console.log(pkg.name);
              }
            " | while read -r name; do
              bash scripts/notify-registry.sh "$name"
            done
        env:
          REGISTRY_API_KEY: ${{ secrets.REGISTRY_API_KEY }}
