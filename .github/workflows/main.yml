name: Main

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  discover:
    name: Discover changed addons
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_addons: ${{ steps.find.outputs.has_addons }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install
      - id: find
        run: |
          # Get packages with pending changesets
          npx changeset status --output cs-status.json 2>/dev/null || true

          # Map package names to directories
          addons=$(node -e "
            const fs = require('fs');
            if (!fs.existsSync('cs-status.json')) process.exit(0);
            const status = JSON.parse(fs.readFileSync('cs-status.json', 'utf8'));
            const names = new Set(status.releases.map(r => r.name));
            const { execSync } = require('child_process');
            const dirs = execSync('find packages -maxdepth 3 -name package.json -not -path \"*/test/*\" -not -path \"*/node_modules/*\"', { encoding: 'utf8' })
              .trim().split('\n');
            for (const dir of dirs) {
              const pkg = JSON.parse(fs.readFileSync(dir, 'utf8'));
              if (names.has(pkg.name)) {
                console.log(dir.replace('/package.json', ''));
              }
            }
          ")

          matrix=$(echo "$addons" | grep -v '^$' | sort | jq -R -s -c 'split("\n") | map(select(length > 0)) | {addon: .}')
          has_addons=$(echo "$addons" | grep -v '^$' | wc -l | tr -d ' ')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_addons=$([[ $has_addons -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Changed addons: $has_addons"

